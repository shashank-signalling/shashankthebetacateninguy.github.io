<!-- _includes/social.html -->
<div class="social-links" style="display:flex; gap:12px; align-items:center;">
  {% if site.author.github %}
    <a href="https://github.com/{{ site.author.github }}" target="_blank" title="GitHub" class="social-icon">
      <img src="/assets/icons/github.svg" alt="GitHub">
    </a>
  {% endif %}

  {% if site.author.linkedin %}
    <a href="https://www.linkedin.com/in/{{ site.author.linkedin }}" target="_blank" title="LinkedIn" class="social-icon">
      <img src="/assets/icons/linkedin.svg" alt="LinkedIn">
    </a>
  {% endif %}

  {% if site.author.scholar_userid %}
    <a href="https://scholar.google.com/citations?user={{ site.author.scholar_userid }}" target="_blank" title="Google Scholar" class="social-icon">
      <img src="/assets/icons/google-scholar.svg" alt="Google Scholar">
    </a>
  {% endif %}

  {% if site.author.email %}
    <a href="mailto:{{ site.author.email }}" target="_blank" title="Email" class="social-icon">
      <img src="/assets/icons/email.svg" alt="Email">
    </a>
  {% endif %}

  {% if site.author.cv %}
    <a href="{{ site.author.cv }}" target="_blank" title="Curriculum Vitae" class="social-icon">
      <img src="/assets/icons/cv.svg" alt="CV">
    </a>
  {% endif %}
</div>
